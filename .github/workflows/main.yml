name: Docker Build and Push
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package -DskipTests
      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login ghcr.io -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Build and Push
        run: |
          docker build -t ghcr.io/${{ secrets.DOCKER_USERNAME }}/examen_aaee_eval3:latest .
          docker push ghcr.io/${{ secrets.DOCKER_USERNAME }}/examen_aaee_eval3:latest
